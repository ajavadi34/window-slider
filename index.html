<!DOCTYPE html>
<html>
<head>
    <meta content="text/html;charset=utf-8" http-equiv="Content-Type">
    <meta content="utf-8" http-equiv="encoding">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="window.slider.css"/>
</head>
<body>
      <div id="slider-1" class="window-slider">
          <!-- TOP LEFT SLIDER -->
          <div class="tl-window">
            <img src="https://picsum.photos/400/250?grayscale&blur=2">
            <img src="https://picsum.photos/400/250?grayscale">
          </div>
          
          <!-- TOP RIGHT SLIDER -->
          <div class="tr-window">
            <img src="https://picsum.photos/400/250?blur=2">
            <img src="https://picsum.photos/400/250">
          </div>
          
          <!-- BOTTOM LEFT SLIDER -->
          <div class="bl-window">
            <img src="https://picsum.photos/400/250?random=1">
            <img src="https://picsum.photos/400/250?random=2">
          </div>
          
          <!-- BOTTOM RIGHT SLIDER -->
          <div class="br-window">
            <img src="https://picsum.photos/400/250?random=3">
            <img src="https://picsum.photos/400/250?random=4">
          </div>
      </div>

      <script src="//ajax.googleapis.com/ajax/libs/jquery/1.7.1/jquery.min.js"></script>
      <script src="window.slider.js"></script>
      <script type="text/javascript">
          $(document).ready(function() {
            $('#slider-1').windowSlider();
          }); 
      </script>
</body>
</html>
